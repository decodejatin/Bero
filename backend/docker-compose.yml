version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: bero_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-bero}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bero_network

networks:
  bero_network:
    driver: bridge

volumes:
  postgres_data:
