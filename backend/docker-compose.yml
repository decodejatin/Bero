version: '3.8'

services:
  nats:
    image: nats:alpine
    container_name: bero_nats
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    command: ["--http_port", "8222"]
    networks:
      - bero_network

  vault:
    image: hashicorp/vault:latest
    container_name: bero_vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - bero_network
    # In production: use vault server -config=/vault/config/config.hcl
    # with auto-unseal, raft storage, and TLS enabled.

networks:
  bero_network:
    driver: bridge

volumes:
# Note: Add a "backend" service entry here when containerising the Go app.
# It should expose:
#   - "8080:8080"   # HTTP/REST (mobile clients)
#   - "50051:50051" # gRPC (internal services, set via GRPC_PORT env var)
